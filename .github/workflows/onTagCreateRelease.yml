name: Create Release

on:
  push:
    tags:
    - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10


jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Create release name using the tag name
        run: |
             githubRef=${{ github.ref }}
             githubRef="${githubRef/'refs/tags'/''}"
             githubRef="${githubRef/'/'/''}"
             githubRef="${githubRef/'v'/''}"
             echo "releaseLabel=$githubRef" >> $GITHUB_ENV


      - name: Print release label
        run: echo $releaseLabel


    ### Generate jar file

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'


      - name: Build jar using Ant
        run: ant -f ant/build.xml -Dversion.num=${{ env.releaseLabel }} clean jar


    ### Assemble release directory

      - name: Create release directory
        run: mkdir -p release/bin


      - name: Copy jar file from dist to the release directory
        run: cp dist/javaxt-core.jar release/bin/javaxt-core.jar


      - name: Copy release assets to the release directory
        run: cp -r src LICENSE.TXT release


    ### Create zip file

      - name: Create zip file
        run: cd release; zip -r ../javaxt-core_v${{ env.releaseLabel }}.zip *


    ### Upload zip file to javaxt.com

      - name: Upload release to server
        run: >-
          curl -X POST -L
          -H "Authorization: ${{ secrets.UPLOAD_AUTH }}"
          -F "file=@javaxt-core_v${{ env.releaseLabel }}.zip;type=application/zip"
          "${{ secrets.UPLOAD_URL }}"
